const SECTIONS = [
  ["identity","Identity","Хто він"],
  ["mission","Mission","Що робить"],
  ["rules","Rules","Обмеження і стандарти"],
  ["deliverables","Deliverables","Що отримаєш на виході"],
  ["workflow","Workflow","Як працює"],
  ["metrics","Metrics","Як вимірювати успіх"]
];

const grid=document.getElementById("grid"), overlay=document.getElementById("overlay");
function openModal(x){
  document.getElementById("mem").textContent=x.e;
  document.getElementById("mname").textContent=x.n;
  document.getElementById("mkind").textContent=x.kind;
  const body=document.getElementById("mbody");
  body.innerHTML="";
  SECTIONS.forEach(([key,label,hint],i)=>{
    const val=x[key];
    const sec=document.createElement("div");
    sec.className="sec";
    let inner=`<h3><span class="num">${i+1}</span>${label} <span style="color:var(--sage);font-weight:400;font-size:12px;margin-left:4px">— ${hint}</span></h3>`;
    if(Array.isArray(val)){
      inner+="<ul>"+val.map(v=>`<li>${v}</li>`).join("")+"</ul>";
    } else {
      inner+=`<p>${val}</p>`;
    }
    sec.innerHTML=inner;
    body.appendChild(sec);
  });
  overlay.classList.add("open");document.body.style.overflow="hidden";
}
function closeModal(){overlay.classList.remove("open");document.body.style.overflow="";}
document.getElementById("close").onclick=closeModal;
overlay.onclick=e=>{if(e.target===overlay)closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

DATA.forEach(x=>{
  const c=document.createElement("div");
  c.className="card";
  c.innerHTML=`<div class="top"><span class="em">${x.e}</span><div><div class="nm">${x.n}</div><div class="kind">${x.kind}</div></div></div><div class="ds">${x.short}</div>`;
  c.onclick=()=>openModal(x);
  grid.appendChild(c);
});
</script></body></html>
