<!DOCTYPE html>
<html lang="uk"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Бібліотека агентів — Ira</title>
<meta name="description" content="Бібліотека з 232 AI-агентів для Claude Code — пошук, фільтри, повні промпти.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=Playfair+Display:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{
  --bg:#0A140F;--bg-2:#0C1A13;--emerald-deep:#0F3D2E;--emerald:#1B5E43;--emerald-bright:#2E8B6B;
  --gold:#D4AF6A;--gold-bright:#E9CC86;--gold-soft:#C8A86040;
  --cream:#EFE7D6;--cream-dim:#D8CFBE;--sage:#9DB0A4;
  --line:rgba(212,175,106,.16);--line-soft:rgba(212,175,106,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Manrope',system-ui,sans-serif;color:var(--cream);line-height:1.6;
  background:
    radial-gradient(60% 50% at 15% 10%,rgba(27,94,67,.25),transparent 60%),
    radial-gradient(50% 40% at 85% 90%,rgba(15,61,46,.30),transparent 60%),
    var(--bg);
  min-height:100vh;padding:48px 24px 80px;
}
.wrap{max-width:1180px;margin:0 auto}
/* language switch — top right */
.langswitch{position:fixed;top:20px;right:20px;z-index:40;display:flex;gap:2px;
  background:rgba(12,26,19,.85);border:1px solid var(--line);border-radius:999px;padding:3px;backdrop-filter:blur(8px)}
.langswitch button{font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.04em;
  padding:6px 14px;border-radius:999px;border:none;cursor:pointer;background:transparent;color:var(--sage);transition:all .16s}
.langswitch button.on{background:var(--emerald);color:var(--gold-bright)}
.langswitch button:not(.on):hover{color:var(--cream)}
header{text-align:center;margin-bottom:40px}
.eyebrow{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--sage);margin-bottom:14px}
h1{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:clamp(34px,6vw,58px);line-height:1.05;letter-spacing:-.01em}
h1 .accent{color:var(--gold-bright);font-style:italic}
.sub{margin-top:16px;color:var(--cream-dim);font-size:16px}
.sub b{color:var(--gold-bright);font-weight:700}
.controls{margin:36px 0 8px;display:flex;flex-direction:column;gap:18px;align-items:center}
.search{width:100%;max-width:520px;position:relative}
.search input{width:100%;padding:15px 18px 15px 46px;border-radius:14px;background:rgba(12,26,19,.72);
  border:1px solid var(--line);color:var(--cream);font-family:inherit;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s}
.search input::placeholder{color:var(--sage)}
.search input:focus{border-color:var(--gold-soft);box-shadow:0 0 0 3px rgba(212,175,106,.10)}
.search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;stroke:var(--sage);fill:none;stroke-width:2}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:940px}
.chip{font-family:inherit;font-size:13.5px;padding:7px 14px;border-radius:999px;cursor:pointer;
  background:rgba(27,94,67,.14);border:1px solid var(--line);color:var(--cream-dim);transition:all .18s;white-space:nowrap}
.chip:hover{border-color:var(--gold-soft);color:var(--cream)}
.chip.active{background:var(--emerald);border-color:var(--gold);color:var(--gold-bright)}
.chip .n{opacity:.6;margin-left:5px;font-variant-numeric:tabular-nums}
.count{text-align:center;color:var(--sage);font-size:13px;margin:20px 0 24px;letter-spacing:.04em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:linear-gradient(160deg,rgba(15,61,46,.35),rgba(12,26,19,.55));border:1px solid var(--line);
  border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:10px;cursor:pointer;
  transition:transform .16s,border-color .16s,box-shadow .16s}
.card:hover{transform:translateY(-3px);border-color:var(--gold-soft);box-shadow:0 12px 30px rgba(0,0,0,.35)}
.card .top{display:flex;align-items:center;gap:11px}
.card .em{font-size:24px;line-height:1}
.card .nm{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:var(--cream);line-height:1.2}
.card .cat{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);opacity:.85}
.card .ds{font-size:13.5px;color:var(--cream-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.empty,.loading{text-align:center;color:var(--sage);padding:60px 0;font-size:16px}
footer{text-align:center;margin-top:56px;color:var(--sage);font-size:12.5px;letter-spacing:.05em}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(5,10,8,.72);backdrop-filter:blur(6px);
  display:none;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:50;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:linear-gradient(165deg,#0d1f17,#0a140f);border:1px solid var(--line);border-radius:20px;
  max-width:820px;width:100%;padding:34px 38px 40px;box-shadow:0 30px 80px rgba(0,0,0,.6);position:relative}
.modal .mhead{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.modal .mem{font-size:34px;line-height:1}
.modal h2{font-family:'Playfair Display',serif;font-size:30px;color:var(--cream);font-weight:700}
.modal .mcat{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
.close{position:absolute;top:20px;right:22px;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  background:rgba(27,94,67,.2);color:var(--cream-dim);font-size:20px;cursor:pointer;transition:all .16s;line-height:1}
.close:hover{border-color:var(--gold-soft);color:var(--gold-bright)}
.mnote{font-size:12px;color:var(--sage);margin-bottom:16px;font-style:italic}
.md{color:var(--cream-dim);font-size:15px;line-height:1.7;border-top:1px solid var(--line-soft);padding-top:22px}
.md h1,.md h2,.md h3{font-family:'Playfair Display',serif;color:var(--cream);margin:22px 0 10px}
.md h1{font-size:24px}.md h2{font-size:20px}.md h3{font-size:17px}
.md p{margin:10px 0}.md ul,.md ol{margin:10px 0 10px 22px}.md li{margin:4px 0}
.md strong{color:var(--gold-bright)}.md em{color:var(--cream)}
.md code{background:rgba(212,175,106,.12);color:var(--gold-bright);padding:2px 6px;border-radius:5px;font-size:.9em}
.md pre{background:rgba(0,0,0,.35);border:1px solid var(--line-soft);border-radius:10px;padding:14px;overflow-x:auto;margin:12px 0}
.md pre code{background:none;color:var(--cream-dim);padding:0}
.md blockquote{border-left:3px solid var(--gold-soft);padding-left:14px;color:var(--sage);margin:12px 0;font-style:italic}
.md a{color:var(--gold-bright)}.md hr{border:none;border-top:1px solid var(--line-soft);margin:20px 0}
::selection{background:var(--gold-soft);color:var(--cream)}
</style></head>
<body>
<div class="langswitch">
  <button id="btn-en" onclick="setLang('en')">EN</button>
  <button id="btn-ua" onclick="setLang('ua')">UA</button>
</div>
<div class="wrap">
<header>
  <div class="eyebrow">Claude Code · ~/.claude/agents</div>
  <h1><span id="h1a">Бібліотека</span> <span class="accent" id="h1b">агентів</span></h1>
  <p class="sub"><b id="total">…</b> <span id="lbl-agents">агентів</span> · <b id="ncat">…</b> <span id="lbl-cats">категорій</span> · <span id="lbl-upd">оновлено</span> <span id="date">…</span></p>
</header>
<div class="controls">
  <div class="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="search" placeholder="Пошук агента — назва або опис…" autocomplete="off">
  </div>
  <div class="chips" id="chips"></div>
</div>
<div class="count" id="count"></div>
<div class="loading" id="loading">Завантаження агентів…</div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">Нічого не знайдено — спробуй інший запит.</div>
<footer id="footer">232 агенти працюють нативно в Claude Code · виклик за іменем у чаті або через Agent tool</footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="close" aria-label="Закрити">✕</button>
    <div class="mhead"><span class="mem" id="mem"></span><h2 id="mname"></h2></div>
    <div class="mcat" id="mcat"></div>
    <div class="mnote" id="mnote"></div>
    <div class="md" id="mbody"></div>
  </div>
</div>

<script>
const I18N={
  en:{h1a:"Agent",h1b:"Library",agents:"agents",cats:"categories",upd:"updated",
      all:"All",search:"Search agent — name or description…",
      count:(x,y)=>"Showing: "+x+" of "+y,empty:"Nothing found — try another query.",
      loading:"Loading agents…",
      footer:"232 agents run natively in Claude Code · call by name in chat or via Agent tool",
      note:"Full prompt (original, English):"},
  ua:{h1a:"Бібліотека",h1b:"агентів",agents:"агентів",cats:"категорій",upd:"оновлено",
      all:"Всі",search:"Пошук агента — назва або опис…",
      count:(x,y)=>"Показано: "+x+" з "+y,empty:"Нічого не знайдено — спробуй інший запит.",
      loading:"Завантаження агентів…",
      footer:"232 агенти працюють нативно в Claude Code · виклик за іменем у чаті або через Agent tool",
      note:"Повний промпт (оригінал, англійською):"}
};
let DATA=[],CATS=[],CATUA={},active="all",query="",lang="en";
const $=id=>document.getElementById(id);
const grid=$("grid"),empty=$("empty"),count=$("count"),chips=$("chips"),overlay=$("overlay");

function catLabel(c){return lang==="ua"?(CATUA[c]||c):c;}
function desc(a){return lang==="ua"?(a.du||a.d):a.d;}

function setLang(l){
  lang=l; try{localStorage.setItem("agentsLang",l);}catch(e){}
  const t=I18N[l];
  document.documentElement.lang = l==="ua"?"uk":"en";
  $("btn-en").classList.toggle("on",l==="en");
  $("btn-ua").classList.toggle("on",l==="ua");
  $("h1a").textContent=t.h1a; $("h1b").textContent=t.h1b;
  $("lbl-agents").textContent=t.agents; $("lbl-cats").textContent=t.cats; $("lbl-upd").textContent=t.upd;
  $("q").placeholder=t.search; $("loading").textContent=t.loading; $("empty").textContent=t.empty;
  $("footer").textContent=t.footer;
  [...chips.children].forEach(b=>{
    const v=b.dataset.val, c=b.dataset.cnt;
    const lbl=v==="all"?t.all:catLabel(v);
    const em=b.dataset.em?b.dataset.em+" ":"";
    b.innerHTML=em+lbl+'<span class="n">'+c+'</span>';
  });
  render();
}
function mkChip(label,emoji,val,cnt){
  const b=document.createElement("button");b.className="chip"+(val==="all"?" active":"");
  b.dataset.val=val;b.dataset.cnt=cnt;b.dataset.em=emoji||"";
  b.innerHTML=(emoji?emoji+" ":"")+label+'<span class="n">'+cnt+'</span>';
  b.onclick=()=>{active=val;[...chips.children].forEach(x=>x.classList.toggle("active",x.dataset.val===val));render();};
  return b;
}
function openModal(x){
  $("mem").textContent=x.e;$("mname").textContent=x.n;$("mcat").textContent=x.ce+" "+catLabel(x.c);
  $("mnote").textContent=I18N[lang].note;
  $("mbody").innerHTML=window.marked?marked.parse(x.body||""):("<pre>"+(x.body||"").replace(/</g,"&lt;")+"</pre>");
  overlay.classList.add("open");document.body.style.overflow="hidden";
}
function closeModal(){overlay.classList.remove("open");document.body.style.overflow="";}
$("close").onclick=closeModal;
overlay.onclick=e=>{if(e.target===overlay)closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
function render(){
  const q=query.trim().toLowerCase();
  const rows=DATA.filter(x=>(active==="all"||x.c===active)&&
    (!q||x.n.toLowerCase().includes(q)||x.d.toLowerCase().includes(q)||(x.du||"").toLowerCase().includes(q)));
  grid.innerHTML="";
  const frag=document.createDocumentFragment();
  rows.forEach(x=>{
    const d=document.createElement("div");d.className="card";
    d.innerHTML='<div class="top"><span class="em">'+x.e+'</span><div><div class="nm">'+x.n+'</div><div class="cat">'+x.ce+" "+catLabel(x.c)+'</div></div></div><div class="ds">'+desc(x)+'</div>';
    d.onclick=()=>openModal(x);frag.appendChild(d);
  });
  grid.appendChild(frag);
  empty.style.display=rows.length?"none":"block";
  count.textContent=I18N[lang].count(rows.length,DATA.length);
}
$("q").addEventListener("input",e=>{query=e.target.value;render();});
fetch("agents-data.json").then(r=>r.json()).then(j=>{
  DATA=j.agents;CATS=j.cats;CATUA=j.cat_ua||{};
  $("total").textContent=DATA.length;$("ncat").textContent=CATS.length;$("date").textContent=j.date;
  chips.appendChild(mkChip(I18N.en.all,"🗂️","all",DATA.length));
  CATS.forEach(c=>chips.appendChild(mkChip(c.name,c.emoji,c.name,c.count)));
  $("loading").style.display="none";
  let saved="en"; try{saved=localStorage.getItem("agentsLang")||"en";}catch(e){}
  setLang(saved);
}).catch(e=>{$("loading").textContent="Помилка завантаження даних.";});
</script></body></html>
